name: EAS Build — Android Preview APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Android Preview APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (for yarn@1.22.22)
        run: corepack enable

      - name: Install frontend dependencies
        run: cd frontend && yarn install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android Preview APK
        run: |
          cd frontend
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
