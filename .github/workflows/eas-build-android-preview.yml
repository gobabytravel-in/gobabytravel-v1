name: EAS Build — Android Preview APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Android Preview APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Link project to your Expo account
        run: |
          cd frontend
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            if (app.expo.extra && app.expo.extra.eas) delete app.expo.extra.eas.projectId;
            if (app.expo.updates) delete app.expo.updates;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Cleared stale projectId — EAS will create a fresh one.');
          "
          eas init --non-interactive

      - name: Build Android Preview APK
        run: |
          cd frontend
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --no-wait
