name: EAS Build — Android Production AAB

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Release notes / reason for this build'
        required: false
        default: 'Production release'

jobs:
  build:
    name: Android Production AAB
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack (for yarn@1.22.22)
        run: corepack enable

      - name: Install frontend dependencies
        run: cd frontend && yarn install --frozen-lockfile

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android Production AAB
        run: |
          cd frontend
          eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --no-wait
